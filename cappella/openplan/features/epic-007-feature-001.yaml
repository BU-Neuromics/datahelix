id: epic-007-feature-001
title: FastAPI app factory and resolve/ingest endpoints
description: >
  Implement FastAPI app factory create_app() with routers for /resolve, /ingest,
  /triggers, /reconcile, /findings, and /status. POST /resolve validates immediately
  and returns 202 with run_id, or 400/422 on invalid request. POST /ingest triggers
  an immediate adapter run. Global error handlers map CappellaError subclasses to
  correct HTTP status codes.
acceptance_criteria:
- Given a POST /resolve with a valid request body, when the request is received,
  then a 202 response is returned with run_id and poll_url within 200ms
- Given a POST /resolve with an invalid entity_type, when the request is received,
  then a 400 response is returned with an error message identifying the invalid field
- Given a POST /resolve where zero samples match the criteria, when the request
  is validated, then a 422 response is returned with a message indicating zero matches
- Given a POST /ingest with adapter=csv_samples in the request body, when the request
  is received, then IngestPipeline.run() is invoked for the csv_samples adapter and a
  202 response is returned with run_id
- Given a CappellaError (not a subclass) is raised in a route handler, when the
  response is returned, then a 500 status code is returned with the error message
- Given an AdapterTransformError (subclass of AdapterError) is raised, when the
  response is returned, then a 422 status code is returned
complexity: medium
dependencies:
- epic-003-feature-001
- epic-004-feature-004
spec_ready: true
