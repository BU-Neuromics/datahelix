name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hippo:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: hippo
        run: uv pip install --system -e ".[dev]"

      - name: Run tests (SQLite)
        working-directory: hippo
        run: pytest -v --ignore=tests/integration/test_postgres_adapter.py

  hippo-postgres:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hippo_test
          POSTGRES_PASSWORD: hippo_test
          POSTGRES_DB: hippo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hippo_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: hippo
        run: uv pip install --system -e ".[dev,postgres]"

      - name: Run PostgreSQL integration tests
        working-directory: hippo
        env:
          HIPPO_DATABASE_URL: postgresql://hippo_test:hippo_test@localhost:5432/hippo_test
        run: pytest tests/integration/test_postgres_adapter.py -v

  cappella:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: cappella
        run: uv pip install --system -e ".[test]"

      - name: Run tests
        working-directory: cappella
        run: pytest -v

  canon:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: canon
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        working-directory: canon
        run: pytest -v

  platform:
    runs-on: ubuntu-latest
    needs: [hippo, cappella, canon]
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install all component dependencies
        run: |
          uv pip install --system -e "hippo/[dev]"
          uv pip install --system -e "canon/[dev]"
          uv pip install --system -e "cappella/[test]"
          uv pip install --system -e "aperture/[dev]"

      - name: Run contract tests
        env:
          PYTHONPATH: hippo/src:canon/src:cappella/src:aperture/src
        run: pytest tests/contracts/ -v -m contract --tb=short

      - name: Run platform integration tests
        env:
          PYTHONPATH: hippo/src:canon/src:cappella/src:aperture/src
        run: pytest tests/platform/ -v -m platform --tb=short
