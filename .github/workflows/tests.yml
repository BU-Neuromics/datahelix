name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Certified-frontier ledger tooling (platform ADR-0001). Pure Python + git —
  # no components — so it runs fast and gives a real green signal for the part of
  # the certification infrastructure that is testable in isolation.
  certification-tooling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run ledger tooling tests
        working-directory: certification
        run: uv run --with pytest python -m pytest tests/ -q

  cappella:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: cappella
        run: uv pip install --system -e ".[test]"

      - name: Run tests
        working-directory: cappella
        run: pytest -v

  canon:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: canon
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        working-directory: canon
        run: pytest -v

  # ---------------------------------------------------------------------------
  # Platform-level CI (cross-component) — DISABLED 2026-06-17.
  #
  # A `platform` job used to run the cross-component contract tests
  # (tests/contracts/) and platform integration tests (tests/platform/) against a
  # full in-process Hippo + Canon + Cappella install. It dominated CI wall-clock
  # (~30 min, serialized behind the cappella/canon jobs) and exercised
  # cross-component behavior that is being actively redesigned — so it gated
  # rapid PR iteration while asserting stale design assumptions.
  #
  # The test files are intentionally KEPT in the repo (tests/contracts/ and
  # tests/platform/); only their execution in CI is disabled. Reintroduce them
  # PER-COMPONENT as each component's design and interfaces stabilize: restore a
  # job that installs the relevant components and runs the relevant subset.
  # See the drylims CI discussion, 2026-06-17.
  # ---------------------------------------------------------------------------
