name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cappella:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: cappella
        run: uv pip install --system -e ".[test]"

      - name: Run tests
        working-directory: cappella
        run: pytest -v

  canon:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: canon
        run: uv pip install --system -e ".[dev]"

      - name: Run tests
        working-directory: canon
        run: pytest -v

  platform:
    runs-on: ubuntu-latest
    needs: [cappella, canon]
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install all component dependencies
        run: |
          uv pip install --system -e "hippo/[dev]"
          uv pip install --system -e "canon/[dev]"
          uv pip install --system -e "cappella/[test]"
          uv pip install --system -e "aperture/[dev]"

      - name: Run contract tests
        env:
          PYTHONPATH: hippo/src:canon/src:cappella/src:aperture/src
        run: pytest tests/contracts/ -v --tb=short

      - name: Run platform integration tests
        env:
          PYTHONPATH: hippo/src:canon/src:cappella/src:aperture/src
        run: pytest tests/platform/ -v --tb=short
