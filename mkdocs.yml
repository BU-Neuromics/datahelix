site_name: BASS Documentation
site_description: Bioinformatics Analysis Software System — platform documentation

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - toc:
      permalink: true

# Pre-existing source docs contain relative links written for GitHub browsing
# that do not resolve within MkDocs. Downgrade to info for now; tracked for cleanup.
validation:
  links:
    not_found: info
    absolute_links: info
    unrecognized_links: info
  nav:
    omitted_files: info
    not_found: warn
    absolute_links: info

extra_css:
  - stylesheets/custom.css

