# DataHelix certification bootstrap fixture — manifest
#
# A versioned package consumed by BOTH the DataHelix composition-certification
# suite AND (once it lands) the component-repo contract checks — notably
# Aperture's contract file, which runs against a booted `mosaic serve` in
# Mosaic's CI (formerly Hippo, ADR-0004; platform ADR-0001). Keeping the seed
# schema + data + control-plane recipe in ONE versioned place means the two
# sides certify against the same fixture.
#
# The fixture version (VERSION) is part of every ledger entry's triple
# (fixture_version) — changing the fixture is a suite change and re-certifies.

name: datahelix-certification-bootstrap
version: 1.0.0            # keep in sync with ./VERSION
schema_min_hippo_core: 0.6.0   # hippo_core version these classes were authored against

provides:
  schema:
    # Order matters for `mosaic ingest --validate-schema` when passed as files;
    # passing the whole `schema/` dir loads both.
    - schema/portal_schema.yaml          # Book / Author / Review domain
    - schema/aperture_control_plane.yaml # ApertureDocument control-plane recipe (ADR-0032)
  data:
    - data/seed.yaml                     # tree-root bundle, idempotent by id
  document_type:
    # The control-plane store the SPA recognizes structurally (name is convention).
    class: ApertureDocument
    kind_field: kind
    name_field: name
    payload_field: payload
    upsert_key: [kind, name]

consumers:
  - DataHelix composition-certification suite (certification/scenarios)
  - Aperture contract file (aperture#16, runs in mosaic CI) — once published

# How the harness seeds a fresh Mosaic from this fixture. The bundle path is
# the documented default; REST/GraphQL paths exist for eras/backends where the
# CLI bundle path differs.
seeding:
  primary: "mosaic ingest --file data/seed.yaml --validate-schema schema/"
  rest: "POST /ingest {entity_type, data} per instance (bearer token)"
  graphql: "ingestBatch(entities, relationships, dryRun:false)"

# Product loops each seed/recipe element supports (one golden-path scenario each).
golden_path_loops:
  browse_filter: "portal_schema Book facets (format enum, in_print boolean, author ref)"
  single_entity_write: "create/update an Author or Book"
  atomic_multi_entity_workflow: "stage Author→Book→Review, whole-set dry-run, atomic batch commit"
  control_plane: "ApertureDocument saved-view + workflow-draft survive reload"
