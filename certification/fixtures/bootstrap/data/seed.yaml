# DataHelix certification — seed data bundle (fixture v1.0.0)
#
# Tree-root bundle format (hippo ingest --file): top-level keys are pluralized
# class-name accessors; values are lists of instance dicts; identity is by `id`
# (re-ingesting an existing id updates it in place, so seeding is idempotent).
#
#   hippo ingest --file seed.yaml \
#     --validate-schema schema/   # validates against portal_schema + control plane
#
# Reference slots (`author`, `book`) carry the referenced instance's `id`.
# Kept small on purpose: enough rows to make browse/filter facets meaningful
# and to leave a clean slate for the write / atomic-workflow loops (which create
# their own entities). The control-plane collection (ApertureDocument) is seeded
# EMPTY — the SPA creates its own saved-views/drafts during the scenario.

authors:
