id: https://w3id.org/bass/certification/portal_schema
name: bass_certification_portal
title: BASS certification — portal domain fixture
description: >-
  The domain schema the composition-certification golden path drives. It is a
  deliberately generic library-catalog (Book / Author / Review) — no BASS
  deployment nouns — chosen to exercise every capability Aperture's SPA derives
  from Hippo's autogenerated GraphQL transport (platform ADR-0001; mirrors the
  shape in Aperture web/src/data/testing/fixtures.ts capableSchema()):

    - a collection list field with equality filters (enum / boolean / ref)   → browse/filter loop
    - a scalar/ref-typed create + update surface                              → single-entity write loop
    - referenced relationships for intra-batch reference resolution           → atomic multi-entity workflow loop
    - full-text search + history                                              → (nightly) deeper coverage

  Kept intentionally small: three domain classes plus the control-plane
  document recipe (aperture_control_plane.yaml). Authored in LinkML because
  Hippo *becomes* the schema it is given (config-driven relational, graph-shaped
  API); Hippo autogenerates the GraphQL types, filters, and create/update/batch
  mutations from these classes at `serve` time.

prefixes:
  linkml: https://w3id.org/linkml/

imports:
  - linkml:types
  - hippo_core

default_range: string

enums:

  BookFormat:
    description: Physical/digital form of a Book — drives an enum facet in browse/filter.
    permissible_values:
      hardcover:
      paperback:
      ebook:
      audiobook:

classes:

  Author:
    is_a: Entity
    description: >-
      A person who writes Books. `name` is full-text searchable; the write loop
      creates an Author, and the atomic-workflow loop creates an Author and its
      Books in one batch (intra-batch reference: the Book's `author` points at
      the not-yet-committed Author by its batch ref).
    attributes:
      name:
        range: string
        required: true
        annotations:
          hippo_search: fts5
      bio:
        range: string

  Book:
    is_a: Entity
    description: >-
      A published work. `format` (enum) and `in_print` (boolean) drive facets;
      `author` is a typed reference used for cross-links and batch resolution.
    attributes:
      title:
        range: string
        required: true
        annotations:
          hippo_search: fts5
      author:
        range: Author
        required: true
        description: The Book's author (typed reference → cross-link + batch resolution).
        annotations:
          hippo_index: true
      format:
        range: BookFormat
        description: Enum facet in the browse/filter loop.
      in_print:
        range: boolean
        ifabsent: "true"
        description: Boolean facet in the browse/filter loop.
      year:
        range: integer

  Review:
    is_a: Entity
    description: >-
      A review of a Book. Third entity in the atomic-workflow batch (Author →
      Book → Review), so the golden path stages a three-node linked set and
      commits it all-or-nothing.
    attributes:
      book:
        range: Book
        required: true
        annotations:
          hippo_index: true
      rating:
        range: integer
        required: true
        description: 1–5 stars.
      body:
        range: string
        annotations:
          hippo_search: fts5
