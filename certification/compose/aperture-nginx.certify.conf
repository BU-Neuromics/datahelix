# Certification override of the aperture image's nginx config.
#
# Adds a /graphql reverse proxy to the mosaic service (formerly hippo,
# ADR-0004) so the golden-path browser talks same-origin: the Playwright
# browser runs on the runner host where the compose-internal `mosaic`
# hostname doesn't resolve, and mosaic serve ships neither CORS headers nor
# anonymous GraphQL access. The proxy solves all three — and prefigures the
# Bridge topology (platform P3.1, Bridge as sole PEP fronting mosaic), so the
# certified composition is a legitimate deployment shape, not a test-only
# hack.
#
# mosaic's GraphQL guard requires a non-empty bearer token (any value passes
# in 0.10.x — verification is Bridge's job later); the proxy injects one on
# the SPA's behalf. The SPA itself is configured with
# VITE_HIPPO_GRAPHQL_URL=/graphql (Aperture's own build-time contract name,
# runtime-injected, see the compose file).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache the runtime config or the HTML shell; hashed assets are
    # immutable. (Mirrors the image's baked-in config.)
    location = /config.js {
        add_header Cache-Control "no-store";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Same-origin seam to the data plane.
    location /graphql {
        proxy_pass http://mosaic:8001/graphql;
        proxy_set_header Authorization "Bearer certify";
        proxy_set_header Host $host;
    }

    # SPA fallback: client-side state lives in query params.
    location / {
        try_files $uri /index.html;
    }
}
