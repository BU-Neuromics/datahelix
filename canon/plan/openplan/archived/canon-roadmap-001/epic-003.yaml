id: epic-003
title: Semantic Planner and Dependency Resolver
outcome: >
  Given a metadata specification for a desired output, Canon can query Hippo
  for existing matching entities (REUSE) or recursively resolve a BUILD plan
  using production rules. Cycle detection prevents infinite recursion.
success_metrics:
  - name: REUSE detection rate
    target: "100% of requests where a matching Hippo entity exists result in a REUSE decision"
    unit: percent
  - name: Cycle detection
    target: "Circular dependency graphs are detected and raise CanonCycleError before any execution"
    unit: test cases passing
architectural_impact:
  - component: canon.planner
    change_type: new
    description: >
      SemanticPlanner class that integrates with HippoClient to query existing
      entities, applies wildcard binding resolution, recursively resolves
      dependencies via RulesEngine, and builds an ExecutionPlan DAG with
      DFS-based cycle detection
  - component: canon.hippo_client
    change_type: new
    description: >
      HippoClient wrapping the Hippo REST API for entity queries by type and
      metadata filter spec; used exclusively by the planner
depends_on:
  - epic-001
  - epic-002
features: []
