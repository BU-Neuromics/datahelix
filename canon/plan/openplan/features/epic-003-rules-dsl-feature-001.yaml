acceptance_criteria:
- Given a valid production rule definition containing all required fields (rule_id
  as str, name as str, condition as dict, action as dict, priority as int), when RulesLoader
  parses the definition, then a ProductionRule instance is returned with each field
  value matching the input exactly
- Given a production rule definition missing the required field "condition", when
  RulesLoader parses the definition, then a ValidationError is raised whose error
  list contains an entry with loc including "condition" and type "missing"
- Given a production rule definition where "priority" is set to the string "high"
  instead of an integer, when RulesLoader parses the definition, then a ValidationError
  is raised whose error list contains an entry with loc including "priority" and type
  indicating an int_parsing or type_error
- Given a production rule definition with a nested "condition" object containing fields
  (field as str, operator as str, value as any), when the rule is validated, then
  the nested condition is parsed into the expected ConditionModel with all sub-fields
  populated and typed correctly
- Given a production rule definition where optional fields (description, metadata,
  enabled) are omitted, when RulesLoader parses the definition, then the ProductionRule
  is created without error and omitted optional fields resolve to their declared defaults
  (description=None, metadata={}, enabled=True)
- Given a production rule definition with an "actions" list containing three action
  dicts each with "type" and "target" keys, when the rule is validated, then the resulting
  ProductionRule.actions list has length 3 and each element is a valid ActionModel
  instance
- Given a production rule definition with a "severity" enum field set to "critical",
  when the rule is validated, then severity is set to the SeverityEnum.CRITICAL member;
  given severity set to "unknown_level", then a ValidationError is raised listing
  the permitted enum values
- Given a production rule definition containing 5 levels of nested condition groups
  (nested "all_of"/"any_of" combinators), when the rule is validated, then each nesting
  level is recursively validated and the resulting model tree depth matches the input
  structure
- Given a production rule definition with more fields than the model's max_fields
  constraint (if configured via model_config), when RulesLoader parses the definition,
  then a ValidationError is raised with a message indicating the field count exceeds
  the allowed maximum
- Given a production rule definition with default values declared on the model (e.g.,
  priority defaults to 0, enabled defaults to True), when those fields are omitted
  from the input, then the parsed ProductionRule has priority=0 and enabled=True without
  any validation error
complexity: low
