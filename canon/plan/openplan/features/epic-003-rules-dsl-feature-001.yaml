acceptance_criteria:
- Given a valid production rule definition with all required fields, when RulesLoader
  parses the definition, then the rule is correctly instantiated as a ProductionRule
  model with all fields populated
- Given an invalid production rule definition missing required fields, when RulesLoader
  attempts to parse the definition, then a validation error is raised with specific
  error details indicating the missing fields
- Given an invalid production rule definition with invalid field types, when RulesLoader
  attempts to parse the definition, then a validation error is raised with specific
  error details indicating the incorrect field types
- Given a production rule definition with nested structures, when the rule is validated,
  then all nested fields are properly validated according to their expected types
  and constraints
- Given a production rule definition with deeply nested structures, when the rule
  is validated, then all nested levels are properly validated according to their respective
  type definitions
- Given a production rule definition with optional fields, when RulesLoader parses
  the definition, then the model correctly handles missing optional fields without
  raising validation errors
- Given a production rule definition with default values for fields, when RulesLoader
  parses the definition, then the model correctly assigns default values when fields
  are not provided
- Given a production rule definition with list fields containing multiple items, when
  the rule is validated, then all items in the list are validated according to the
  specified item type
- Given a production rule definition with enum fields, when the rule is validated,
  then only valid enum values are accepted and invalid values raise validation errors
- Given a production rule definition that exceeds maximum allowed field count, when
  RulesLoader attempts to parse the definition, then a validation error is raised
  indicating the maximum limit has been exceeded
complexity: low
dependencies: []
description: Implement the ProductionRule Pydantic model with proper validation and
  structure for rule definitions.
