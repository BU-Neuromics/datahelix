acceptance_criteria:
- Given a valid input binding specification with all required fields, when parsed
  by the InputBinding model, then the model is correctly instantiated with proper
  type validation for each field
- Given a valid produces specification with all required fields, when parsed by the
  ProducesSpec model, then the model is correctly instantiated with all required fields
  populated
- Given an input binding specification with missing required fields, when parsed by
  the InputBinding model, then a validation error is thrown indicating the missing
  fields
- Given a produces specification with missing required fields, when parsed by the
  ProducesSpec model, then a validation error is thrown indicating the missing fields
- Given an input binding specification with invalid field types, when parsed by the
  InputBinding model, then appropriate validation errors are thrown for each invalid
  field type
- Given a produces specification with invalid field types, when parsed by the ProducesSpec
  model, then appropriate validation errors are thrown for each invalid field type
- Given a valid input binding specification with optional fields, when parsed by the
  InputBinding model, then the model correctly handles the optional fields with default
  values or None
- Given a valid produces specification with optional fields, when parsed by the ProducesSpec
  model, then the model correctly handles the optional fields with default values
  or None
- Given an input binding specification that exceeds maximum field length constraints,
  when parsed by the InputBinding model, then a validation error is thrown for the
  oversized fields
- Given a produces specification that exceeds maximum field length constraints, when
  parsed by the ProducesSpec model, then a validation error is thrown for the oversized
  fields
complexity: low
dependencies: []
description: Implement InputBinding and ProducesSpec Pydantic models to define rule
  input and output specifications.
