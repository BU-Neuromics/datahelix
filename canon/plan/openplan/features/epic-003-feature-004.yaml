acceptance_criteria:
- Given a rule with mismatched tool versions in sidecar, when the RulesLoader validates
  it, then it raises a ToolVersionError indicating version inconsistency details
- Given an identity_field reference in rule that doesn't exist in sidecar, when the
  RulesLoader processes it, then it throws an InvalidIdentityFieldError with specific
  field name information
- Given duplicate produces specs across rules and sidecars, when the RulesLoader checks
  consistency, then it raises a DuplicateProducesSpecError identifying the conflicting
  specifications
