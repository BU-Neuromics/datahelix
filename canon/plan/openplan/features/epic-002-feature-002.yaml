acceptance_criteria:
- Given a valid Tool definition YAML with `name` set to a non-empty string and `category`
  set to one of the allowed enum values (aligner, trimmer, counter, indexer, caller,
  quantifier, other), when the LinkML schema validates the definition, then validation
  passes with no errors and the entity is accepted
- Given a Tool definition YAML where the `name` field is omitted, when the LinkML
  schema validates the definition, then validation fails with a structured error message
  that identifies `name` as a missing required field
- Given a Tool definition YAML where the `category` field is omitted, when the LinkML
  schema validates the definition, then validation fails with a structured error message
  that identifies `category` as a missing required field
- Given a Tool definition YAML where `category` is set to an invalid value (e.g. "sorter"),
  when the LinkML schema validates the definition, then validation fails with a structured
  error message listing the allowed enum values for `category`
- Given a Tool definition YAML where `homepage_url` is set to a malformed URI (e.g.
  "not-a-url"), when the LinkML schema validates the definition, then validation fails
  with a structured error message indicating `homepage_url` must be a valid URI
- Given a Tool definition YAML with all optional fields populated (`description` as
  string, `homepage_url` as valid URI, `biotools_id` as string, `bioconda_name` as
  string), when the LinkML schema validates the definition, then validation passes
  and all optional fields are present in the stored entity
- Given the Tool schema has been loaded into a Hippo instance, when querying the LinkML
  schema for the Tool class definition, then the response includes exactly two required
  slots (`name` of type string, `category` of type enum) and four optional slots (`description`,
  `homepage_url`, `biotools_id`, `bioconda_name`) with their declared types
- Given a Tool definition YAML with both `name` and `category` missing, when the LinkML
  schema validates the definition, then validation fails and the structured error
  output lists both `name` and `category` as missing required fields in a single report
complexity: low
dependencies:
- feature-001
description: Define the LinkML schema for the Tool entity type with required fields
  and validation rules.
