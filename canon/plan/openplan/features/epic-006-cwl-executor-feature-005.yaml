acceptance_criteria:
- Given the canon package is installed, when importlib.metadata.entry_points is called
  for group canon.executor_adapters, then the cwltool entry point is present with
  the CwltoolAdapter class as its value
- Given the canon.executor_adapters entry point is registered, when the entry point
  is loaded via ep.load(), then it returns the CwltoolAdapter class without import errors
- Given two executor packages are installed (canon and a hypothetical canon-executor-toil),
  when discover_adapters is called, then both adapters appear in the returned dict
  keyed by their name attributes
- Given CanonConfig.validate is called at startup, when the configured executor name
  matches a discovered adapter, then validate_available is called on that adapter
- Given the configured executor name in canon.yaml does not match any discovered adapter,
  when CanonConfig.validate is called, then it raises CanonConfigError with the
  missing adapter name and install instructions
complexity: low
dependencies:
- epic-006-cwl-executor-feature-003
description: Register CwltoolAdapter in the canon.executor_adapters entry point group
  so it is discoverable at runtime via importlib.metadata.
id: epic-006-cwl-executor-feature-005
spec_ready: true
title: Entry Point Discovery for CwltoolAdapter
