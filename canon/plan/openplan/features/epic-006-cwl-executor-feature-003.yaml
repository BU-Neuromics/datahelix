acceptance_criteria:
- Given CwltoolAdapter is initialized and cwltool is installed, when run is called
  with a valid CWL workflow path and inputs dict, then it writes inputs.json to work_dir,
  invokes cwltool as a subprocess, and returns a CWLRunResult with exit_code=0
- Given CwltoolAdapter.run completes successfully, when the returned CWLRunResult is
  inspected, then its outputs field contains the parsed JSON from cwltool stdout and
  runner_version contains the cwltool version string
- Given cwltool is not installed or not on PATH, when CwltoolAdapter.validate_available
  is called at startup, then it raises CanonConfigError with instructions to install cwltool
- Given cwltool exits with a non-zero exit code, when CwltoolAdapter.run is called,
  then it raises CanonExecutorError with the exit code and the captured stderr content
- Given cwltool_options list is configured with --no-container, when CwltoolAdapter
  invokes cwltool, then those options appear in the subprocess command before the CWL
  file path argument
complexity: medium
dependencies:
- epic-006-cwl-executor-feature-001
- epic-006-cwl-executor-feature-002
description: Implement CwltoolAdapter that invokes cwltool as a subprocess, constructs
  inputs.json, parses JSON output, and detects execution environment.
id: epic-006-cwl-executor-feature-003
