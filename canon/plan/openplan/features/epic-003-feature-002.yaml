acceptance_criteria:
- Given a rule with a CWL workflow path, when the RulesLoader resolves sidecar files,
  then it correctly computes the absolute path to the sidecar file
- Given a CWL workflow path that has no corresponding .canon.yaml sidecar file, when
  the RulesLoader processes it, then it raises a SidecarMissingError with file path
  details
- Given a rule with non-existent CWL workflow path, when the RulesLoader resolves
  paths, then it throws a WorkflowNotFoundError indicating the missing path
complexity: medium
dependencies: []
description: Resolve .canon.yaml sidecar file paths relative to each CWL workflow
  path and validate their existence.
