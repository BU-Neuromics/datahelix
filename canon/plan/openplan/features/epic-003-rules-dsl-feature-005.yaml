acceptance_criteria:
- Given a registered rule with name "test_rule", when find_rule is called with rule
  name "test_rule", then the correct rule object with name "test_rule" is returned
- Given multiple rules registered for entity type "user", when rules_for_entity_type
  is called with entity type "user", then all matching rules for entity type "user"
  are returned in a list
- Given no matching rule registered with name "nonexistent_rule", when find_rule is
  called with rule name "nonexistent_rule", then None is returned
- Given a registered rule with name "complex_rule", when find_rule is called with
  rule name "complex_rule", then the correct rule object with name "complex_rule"
  is returned and its properties match the expected configuration
- Given multiple rules for entity type "order", when rules_for_entity_type is called
  with entity type "order", then all matching rules for entity type "order" are returned
  in a list and their order is preserved as registered
complexity: medium
dependencies: []
description: Implement the RuleRegistry with find_rule and rules_for_entity_type methods
  for rule lookup.
