id: epic-008-feature-003
title: README and canon_rules.yaml format documentation
description: >
  Write a comprehensive README.md for Canon covering: project overview, quickstart
  (install, write canon.yaml, write canon_rules.yaml, run `canon plan`/`canon run`),
  canon_rules.yaml format reference with the STAR alignment example from the design
  notes, canon_outputs.json schema, WorkflowExecutorAdapter plugin guide for third-party
  adapters, and an annotated end-to-end example (FastqFile -> AlignmentFile).
acceptance_criteria:
  - "README.md exists at the project root with all five sections: overview, quickstart, rules format, outputs format, plugin guide"
  - canon_rules.yaml format reference includes the complete STAR alignment rule example from the design notes
  - "canon_outputs.json schema documents all required fields: entity_type and metadata (object)"
  - Plugin guide documents the canon.executor_adapters entry point group and the required method signatures
  - Quickstart can be followed from scratch on a machine with Python and a local Hippo instance
dependencies:
  - epic-007-feature-003
complexity: low
spec_ready: true
