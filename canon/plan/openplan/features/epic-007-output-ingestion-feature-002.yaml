acceptance_criteria:
- Given a CWL output file exists at a local file:// path and output_storage is configured
  with type=local and base_path=/data/outputs, when OutputIngestionPipeline.relocate()
  is called with that file path along with entity_type="sample", a date string, and
  a run_id, then the file is moved to /data/outputs/sample/{date}/{run_id}/{original_basename}
  and the returned uri string equals the absolute path of the new location
- Given output_storage is configured with type=s3, bucket="my-bucket", and prefix="pipeline-out",
  when OutputIngestionPipeline.relocate() is called with a local CWL output file path,
  entity_type="sample", date="2026-03-24", and run_id="run-abc123", then the file
  is uploaded to s3://my-bucket/pipeline-out/sample/2026-03-24/run-abc123/{original_basename}
  and the returned uri string matches that s3:// URI exactly
- Given the destination directory /data/outputs/sample/2026-03-24/run-abc123/ does
  not exist and cannot be created (e.g., parent path is a file or permission denied),
  when OutputIngestionPipeline.relocate() attempts to move the CWL output file, then
  a CanonIngestionError is raised whose message contains both the source path and
  the intended destination path
- Given a CWL run produced three output files (results.bam, results.bam.bai, metrics.json)
  in the cwltool work directory, when OutputIngestionPipeline.relocate() is called
  for each file with the same entity_type, date, and run_id, then all three files
  reside in the same directory /data/outputs/{entity_type}/{date}/{run_id}/ with their
  original basenames preserved
- Given a successful relocation from cwltool work directory /tmp/cwltool_work/abc123/results.bam
  to local output_storage with base_path=/data/outputs, when the returned uri is inspected,
  then it starts with /data/outputs/ and does not contain any segment of the cwltool
  work directory path such as /tmp/cwltool_work/
- Given the source CWL output file does not exist at the specified path, when OutputIngestionPipeline.relocate()
  is called, then a CanonIngestionError is raised whose message indicates the source
  file was not found and includes the missing path
- Given output_storage is configured with type=local and the destination file already
  exists at the target path, when OutputIngestionPipeline.relocate() is called, then
  the existing file is overwritten with the new file and the returned uri reflects
  the destination path without error
- Given a CWL output file of zero bytes, when OutputIngestionPipeline.relocate() is
  called with valid output_storage configuration, then the file is relocated successfully
  and the returned uri points to the zero-byte file at the destination path
complexity: medium
dependencies: []
description: Implement the output file relocation step that moves CWL output files
  from the cwltool work directory to the configured output_storage location before
  Hippo ingestion.
id: epic-007-output-ingestion-feature-002
spec_ready: true
title: Output File Relocation Service
