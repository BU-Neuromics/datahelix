id: epic-001-core-types-feature-004
epic: epic-001-core-types
title: CanonSpec dataclass implementation
description: >
  Implement the CanonSpec dataclass that serves as the core representation
  of canonical specifications. CanonSpec holds typed fields (scalars and
  entity references) and supports validation, default values, enum
  constraints, pattern constraints, and YAML round-trip serialization.
status: draft
spec_ready: true
complexity: medium
dependencies:
  - epic-001-core-types-feature-002
  - epic-001-core-types-feature-003
acceptance_criteria:
  - >
    Given a CanonSpec dataclass definition with typed fields (str, int, bool,
    float, Optional, List, Dict) and a valid input dict matching that schema,
    when CanonSpec is instantiated from the dict, then all fields are populated
    with correct Python types and no validation error is raised
  - >
    Given an input dict where a field value has an incompatible type (e.g. a
    string "abc" assigned to an int-typed field), when CanonSpec validation
    runs, then a TypeError is raised whose message includes the field name,
    the provided type, and the expected type
  - >
    Given an input dict missing a required field (a field with no default
    value), when CanonSpec validation runs, then a ValueError is raised whose
    message names the missing field and its expected type
  - >
    Given a CanonSpec dataclass with optional fields that declare default
    values, when instantiated with an input dict that omits those optional
    fields, then the instance contains the declared default values and passes
    validation
  - >
    Given a CanonSpec with an enum-typed field whose allowed values are
    ["DRAFT", "ACTIVE", "DEPRECATED"], when instantiated with an invalid enum
    value "UNKNOWN", then a ValueError is raised whose message lists the valid
    options for that field
  - >
    Given a CanonSpec instance containing nested objects and lists (e.g. a
    list of sub-spec dicts, a nested metadata dict), when serialized to a YAML
    string via yaml.dump and deserialized back via yaml.safe_load, then the
    round-tripped data is structurally equal to the original with identical
    Python types for every value
  - >
    Given a CanonSpec with a field constrained by a regex pattern (e.g. field
    "id" must match ^[a-z][a-z0-9-]*$), when instantiated with a value
    violating the pattern (e.g. "123-invalid"), then a ValueError is raised
    whose message includes the field name and the expected pattern
  - >
    Given a CanonSpec with a List[SubSpec] field where SubSpec has its own
    required fields, when one item in the list is missing a required SubSpec
    field, then validation raises a ValueError whose message includes the list
    field name, the item index, and the missing sub-field name
  - >
    Given a CanonSpec dataclass with nested self-referential structures that
    form a circular reference, when serialization is attempted, then the
    serializer detects the cycle and raises a clear error without entering
    infinite recursion
  - >
    Given a CanonSpec instance containing only scalar values (str, int, float,
    bool) and string values, when serialized to JSON via json.dumps and
    deserialized back via json.loads, then the round-tripped data is
    structurally equal to the original. When the instance also contains
    EntityRef fields, the serializer delegates to EntityRef's to_dict() method
    so the full instance is JSON-serializable without error.
tasks:
  - id: task-001
    title: Define CanonSpec dataclass skeleton
    description: >
      Create the CanonSpec dataclass with typed fields supporting str, int,
      bool, float, Optional, List, and Dict. Include a class-level registry
      of field metadata (defaults, constraints, enum values, regex patterns).
    depends_on: []
  - id: task-002
    title: Implement field-level validation
    description: >
      Add validation logic that checks required fields, type compatibility,
      enum membership, and regex pattern conformance. Raise TypeError for
      type mismatches and ValueError for missing fields, invalid enums, and
      pattern violations. Error messages must include the field name and
      expected constraint.
    depends_on:
      - task-001
  - id: task-003
    title: Implement nested and list validation
    description: >
      Support List[SubSpec] fields where each item is validated against
      SubSpec's own constraints. Error messages must include the list field
      name, item index, and specific sub-field violation.
    depends_on:
      - task-002
  - id: task-004
    title: Implement YAML round-trip serialization
    description: >
      Add to_yaml() and from_yaml() methods (or equivalent) ensuring
      CanonSpec instances survive yaml.dump / yaml.safe_load round-trips
      with structural equality and type fidelity.
    depends_on:
      - task-001
  - id: task-005
    title: Implement JSON serialization with EntityRef support
    description: >
      Add to_dict() / to_json() methods. For scalar-only instances, use
      standard json.dumps. For instances containing EntityRef fields,
      delegate to EntityRef.to_dict() so the full object graph is
      JSON-serializable.
    depends_on:
      - task-001
  - id: task-006
    title: Implement cycle detection for self-referential structures
    description: >
      Add cycle detection to the serialization path so that circular
      references raise a clear error instead of causing infinite recursion.
    depends_on:
      - task-004
      - task-005
