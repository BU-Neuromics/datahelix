acceptance_criteria:
- Given a direct circular dependency where rule A depends on rule B and rule B depends
  on rule A, when RecursivePlanner.resolve is called with rule A as the target, then
  a CanonCycleError is raised and no CWL CommandLineTool or Workflow is submitted
  for execution
- Given a direct circular dependency where rule A depends on rule B and rule B depends
  on rule A, when RecursivePlanner.resolve is called with rule B as the target, then
  a CanonCycleError is raised with identical cycle detection behavior regardless of
  entry point
- Given a CanonCycleError raised from a cycle A -> B -> A, when the cycle_path attribute
  is read, then it returns an ordered sequence [A, B, A] where each element is the
  entity spec identifier and the first and last elements are identical
- Given an indirect cycle A -> B -> C -> A, when RecursivePlanner.resolve is called
  for A, then a CanonCycleError is raised with cycle_path equal to [A, B, C, A] showing
  all intermediate nodes in dependency order
- Given a linear dependency chain A -> B -> C with no cycles, when RecursivePlanner.resolve
  is called for A, then resolution completes successfully, returns a valid execution
  plan, and no CanonCycleError is raised
- Given a diamond dependency graph where A -> B, A -> C, B -> D, C -> D with no cycles,
  when RecursivePlanner.resolve is called for A, then resolution completes successfully
  without raising CanonCycleError despite node D being reachable via two paths
- Given two sequential resolution calls where the first resolves a graph containing
  a cycle (raising CanonCycleError) and the second resolves an independent acyclic
  graph, when the second call executes, then it completes successfully because the
  grey-set state from the first call is fully cleared and does not leak across invocations
- Given a self-referential rule where rule A depends on itself (A -> A), when RecursivePlanner.resolve
  is called for A, then a CanonCycleError is raised with cycle_path equal to [A, A]
- Given a long indirect cycle of length 5 (A -> B -> C -> D -> E -> A), when RecursivePlanner.resolve
  is called for any node in the cycle, then a CanonCycleError is raised and the cycle_path
  contains all nodes from the entry point through the full cycle back to the repeated
  node
complexity: high
dependencies: []
description: Implement grey-set cycle detection in RecursivePlanner to detect circular
  rule dependencies before any CWL execution begins, raising CanonCycleError with
  the full cycle path.
id: epic-005-recursive-planner-feature-002
spec_ready: true
title: Grey-set cycle detection
