acceptance_criteria:
- Given the Hippo schema.yaml file, when parsed as YAML, then a top-level entity key
  "WorkflowRun" exists under the entities (or classes) section
- Given the WorkflowRun entity definition in schema.yaml, when its fields are inspected,
  then a "workflow_name" field is present with type "string" and required flag set
  to true
- Given the WorkflowRun entity definition in schema.yaml, when its fields are inspected,
  then an "execution_timestamp" field is present with type "datetime" and required
  flag set to true
- Given the schema.yaml file containing the WorkflowRun entity, when the LinkML or
  project-standard schema validator is run against it, then zero validation errors
  are reported for the WorkflowRun definition
- Given a WorkflowRun instance with workflow_name set to a non-empty string and execution_timestamp
  set to an ISO-8601 datetime, when validated against the schema, then the instance
  passes validation without errors
- Given a WorkflowRun instance with workflow_name omitted or set to null, when validated
  against the schema, then a required-field validation error is returned for workflow_name
- Given a WorkflowRun instance with execution_timestamp set to a non-datetime value
  (e.g., "not-a-date"), when validated against the schema, then a type validation
  error is returned for execution_timestamp
