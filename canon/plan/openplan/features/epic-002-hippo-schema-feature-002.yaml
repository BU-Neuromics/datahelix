acceptance_criteria:
- Given the schema.yaml file exists, when a developer inspects the ToolVersion entity
  type definition, then it contains a field named version_number with type string
  and required status set to true
- Given the schema.yaml file exists, when a developer inspects the ToolVersion entity
  type definition, then it contains a field named release_date with type datetime
  and required status set to true
- Given a ToolVersion instance is created with both version_number (string) and release_date
  (datetime) provided, when the instance is validated against the schema, then validation
  passes with no errors
- Given a ToolVersion instance is created with version_number omitted, when the instance
  is validated against the schema, then validation fails and the error message identifies
  version_number as a missing required field
- Given a ToolVersion instance is created with release_date omitted, when the instance
  is validated against the schema, then validation fails and the error message identifies
  release_date as a missing required field
- Given a ToolVersion instance is created with version_number set to a non-string
  value (e.g., integer 123), when the instance is validated against the schema, then
  validation fails and the error message identifies a type mismatch on version_number
- Given the schema.yaml containing the ToolVersion entity type is loaded by the Hippo
  SDK, when a caller requests the ToolVersion entity definition, then the SDK returns
  a valid entity descriptor with exactly the declared fields and their types
- Given the ToolVersion entity type is defined in schema.yaml, when a database migration
  is generated and applied, then a tool_version table exists with columns version_number
  (text/varchar, NOT NULL) and release_date (timestamp, NOT NULL)
