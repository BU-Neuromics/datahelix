acceptance_criteria:
- Given a rule validation fails during execution, when CanonRuleValidationError is
  raised, then the error message includes validation details with field name and error
  type
- Given a rule validation fails during execution, when CanonRuleValidationError is
  raised, then the error message includes stack trace information for debugging
- Given a rule validation fails during execution, when CanonRuleValidationError is
  raised, then the exception contains original validation error data from Pydantic
- Given a resolution process encounters issues, when CanonResolutionError is raised,
  then it captures the resolution context including task ID and component name
- Given a resolution process encounters issues, when CanonResolutionError is raised,
  then it includes detailed error information such as error type and description
- Given a resolution process encounters issues, when CanonResolutionError is raised,
  then the exception preserves original error information from underlying system
- Given a task execution problem occurs in canon components, when CanonExecutionError
  is raised, then proper error propagation maintains call stack information
- Given a task execution problem occurs in canon components, when CanonExecutionError
  is raised, then the exception includes component-specific context information
- Given a task execution problem occurs in canon components, when CanonExecutionError
  is raised, then it provides debugging capabilities through structured error data
complexity: low
