# DataHelix solo recipe — single-origin front for the whole bundle.
#
# Aperture SPA at /, LinkML Modeler at /modeler/, data plane proxied at
# /graphql (+ /docs, /health). Same-origin proxying is the certification-
# proven seam (certification/compose/aperture-nginx.certify.conf): the SPA is
# configured with a relative VITE_HIPPO_GRAPHQL_URL=/graphql, so no CORS
# configuration exists anywhere in the stack, and the proxy injects the
# non-empty bearer token Mosaic's placeholder guard requires (any value
# passes — verification is Bridge's job later; this recipe is single-user).

server {
    listen 8080;
    server_name _;
    root /srv/aperture;
    index index.html;

    # Never cache the runtime config or the HTML shell; hashed assets are
    # immutable. (Mirrors the Aperture image's own config, ADR-0034.)
    location = /config.js {
        add_header Cache-Control "no-store";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── LinkML Modeler (static, built with VITE_BASE_URL=/modeler/) ──
    # alias strips the /modeler/ prefix; unknown paths fall back to the
    # modeler's SPA shell (same pattern as the modeler's own deploy config).
    location /modeler/ {
        alias /srv/modeler/;
        try_files $uri $uri/ /modeler/index.html;
    }

    # Same-origin git relay for the Modeler's remote-git flow (Mode R).
    location /cors-proxy/ {
        proxy_pass http://127.0.0.1:9999/;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        # Disable buffering so git progress streaming works correctly.
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ── Data plane (mosaic serve --graphql on localhost) ──
    location /graphql {
        proxy_pass http://127.0.0.1:8001/graphql;
        proxy_set_header Authorization "Bearer solo";
        proxy_set_header Host $host;
    }

    # Human conveniences: liveness + interactive API docs.
    # NOTE: only these paths are proxied — Mosaic's full REST surface is not
    # exposed through this port ("Try it out" on non-proxied routes 404s).
    # Publish the container's 8001 directly if you need raw REST access.
    location = /health {
        proxy_pass http://127.0.0.1:8001/health;
    }
    location = /docs {
        proxy_pass http://127.0.0.1:8001/docs;
        proxy_set_header Authorization "Bearer solo";
    }
    location = /redoc {
        proxy_pass http://127.0.0.1:8001/redoc;
        proxy_set_header Authorization "Bearer solo";
    }
    location = /openapi.json {
        proxy_pass http://127.0.0.1:8001/openapi.json;
        proxy_set_header Authorization "Bearer solo";
    }

    # SPA fallback: Aperture's client-side state lives in query params.
    location / {
        try_files $uri /index.html;
    }
}
