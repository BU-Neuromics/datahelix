# DataHelix demo recipe — same-origin front (no Modeler: the demo dataset is
# immutable, so there is no schema-editing surface).
server {
    listen 8080;
    server_name _;
    root /srv/aperture;
    index index.html;

    location = /config.js {
        add_header Cache-Control "no-store";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Same-origin data plane (mosaic serve --graphql on localhost); nginx
    # injects the placeholder bearer token the guard requires.
    location /graphql {
        proxy_pass http://127.0.0.1:8001/graphql;
        proxy_set_header Authorization "Bearer demo";
        proxy_set_header Host $host;
    }
    location = /health {
        proxy_pass http://127.0.0.1:8001/health;
    }
    location = /docs {
        proxy_pass http://127.0.0.1:8001/docs;
        proxy_set_header Authorization "Bearer demo";
    }
    location = /openapi.json {
        proxy_pass http://127.0.0.1:8001/openapi.json;
        proxy_set_header Authorization "Bearer demo";
    }

    location / {
        try_files $uri /index.html;
    }
}
