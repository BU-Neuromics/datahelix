worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 256;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Upstream component services (Docker Compose service names)
    upstream mosaic  { server mosaic:8001; }
    upstream canon   { server canon:8002; }
    upstream cappella { server cappella:8003; }

    server {
        listen 8080;
        server_name _;

        # --- Gateway health (aggregates downstream health) ---
        location = /bridge/health {
            default_type application/json;
            content_by_lua_block {
                -- placeholder: returns 200 for now; full Bridge will aggregate
            }
            return 200 '{"status":"healthy","gateway":"nginx"}';
        }

        # --- Route: Mosaic API ---
        location /mosaic/ {
            rewrite ^/mosaic/(.*) /$1 break;
            proxy_pass http://mosaic;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Route: Canon API ---
        location /canon/ {
            rewrite ^/canon/(.*) /$1 break;
            proxy_pass http://canon;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Route: Cappella API ---
        location /cappella/ {
            rewrite ^/cappella/(.*) /$1 break;
            proxy_pass http://cappella;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Default: Mosaic (primary service)
        location / {
            proxy_pass http://mosaic;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
